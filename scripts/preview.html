<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  body{margin:0;background:#111}
  .grid{display:grid;grid-template-columns:repeat(8,256px);grid-auto-rows:256px;width:2048px}
  .grid img{width:256px;height:256px;display:block}
</style></head><body>
<div class="grid">
<script>
const X0=12,Y0=13
for(let y=Y0;y<=Y0+5;y++)for(let x=X0;x<=X0+7;x++)
  document.write(`<img src="../public/maps/L0-${x}-${y}.svg">`)
</script>
</div>
</body></html>
